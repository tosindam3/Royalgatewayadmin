name: Deploy RoyalGatewayAdmin

on:
  push:
    branches: [ main, staging ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Build React Frontend
      run: |
        npm install
        npm run build

    - name: Copy React Build
      run: |
        # Clear old assets but keep Laravel entry points
        rm -rf backend/public/assets
        cp -r dist/* backend/public/

    - name: Deploy Backend Core
      run: |
        rsync -avz --delete --exclude 'public' -e "ssh -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=no" \
        backend/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.DEPLOY_PATH }}/

    - name: Prepare Public Entry Point
      run: |
        # Adjust index.php paths for sibling directory structure before sync
        sed -i "s|__DIR__.'/../vendor|__DIR__.'/../apps/royalgatewayadmin/vendor|g" backend/public/index.php
        sed -i "s|__DIR__.'/../bootstrap|__DIR__.'/../apps/royalgatewayadmin/bootstrap|g" backend/public/index.php

    - name: Deploy Public Assets
      run: |
        rsync -avz --delete -e "ssh -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=no" \
        backend/public/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/public_html/

    - name: Run Laravel Commands
      run: |
        ssh -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=no ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
          cd ${{ secrets.DEPLOY_PATH }}
          # Restore .env if missing (Deployment might have wiped it)
          if [ ! -f .env ]; then
             cp .env.example .env
             php artisan key:generate
          fi
          composer install --no-dev --optimize-autoloader
          php artisan migrate --force
          php artisan db:seed --force
          php artisan optimize
        EOF