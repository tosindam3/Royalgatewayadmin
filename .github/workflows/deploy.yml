name: Deploy to Hostinger (Pull-Based)

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        # temporarily disable cache to avoid corrupted npm cache causing optional dependency bugs
        
    - name: Install dependencies
      run: npm install
        
    - name: Build frontend
      run: npm run build
      
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        
    - name: Test SSH Connection
      run: |
        echo "Testing SSH connection..."
        timeout 30 ssh -v -i ~/.ssh/id_rsa \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=5 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            "echo 'SSH connection successful'; uptime" || {
            echo "ERROR: Cannot connect to server"
            echo "This could be:"
            echo "1. Firewall blocking GitHub Actions IPs"
            echo "2. Server down or SSH service not running"
            echo "3. Incorrect SSH key or credentials"
            exit 1
        }
        
    - name: Deploy Frontend
      run: |
        echo "Uploading frontend files..."
        for i in {1..3}; do
            echo "Attempt $i of 3"
            scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
                -i ~/.ssh/id_rsa \
                -o ConnectTimeout=30 \
                -o ServerAliveInterval=10 \
                -o StrictHostKeyChecking=no \
                -r dist/* \
                ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/domains/royalgatewayadmin.com/public_html/ && break || sleep 10
        done
        
    - name: Trigger Backend Deployment
      run: |
        echo "Triggering backend deployment on server..."
        ssh -i ~/.ssh/id_rsa \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            "DEPLOY_TOKEN='${{ secrets.DEPLOY_TOKEN_PAT }}' bash -s" << 'EOF'
        set -e
        cd ~/apps/royalgatewayadmin
        
        echo "Enabling maintenance mode..."
        php artisan down --retry=60 || true
        
        echo "Pulling latest code via GitHub token..."
        git remote set-url origin "https://tosindam3:${DEPLOY_TOKEN}@github.com/tosindam3/Royalgatewayadmin.git"
        git fetch origin main
        git reset --hard origin/main
        git remote set-url origin "https://github.com/tosindam3/Royalgatewayadmin.git"
        
        echo "Installing dependencies..."
        composer install --no-dev --optimize-autoloader --no-interaction
        
        echo "Optimizing Laravel..."
        php artisan optimize:clear
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache
        
        echo "Disabling maintenance mode..."
        php artisan up
        
        echo "Deployment complete!"
        EOF
        
    - name: Verify Deployment
      run: |
        echo "Verifying deployment..."
        sleep 5
        curl -f --max-time 10 https://www.royalgatewayadmin.com/api/health || {
            echo "WARNING: Health check failed"
            exit 1
        }
