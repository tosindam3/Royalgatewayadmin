name: RoyalGatewayAdmin Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy React + Laravel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
# ---------------------------------------
# Checkout Repository
# ---------------------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

# ---------------------------------------
# Setup Node
# ---------------------------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

# ---------------------------------------
# Install Dependencies
# ---------------------------------------
    - name: Install Dependencies
      run: npm ci

# ---------------------------------------
# Build React
# ---------------------------------------
    - name: Build React
      env:
        VITE_API_BASE_URL: https://www.royalgatewayadmin.com/api/v1
        NODE_ENV: production
      run: npm run build

# ---------------------------------------
# Setup SSH
# ---------------------------------------
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts

# ---------------------------------------
# Deploy React Frontend
# ---------------------------------------
    - name: Deploy React
      run: |
        rsync -avz --delete \
        -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }}" \
        dist/ \
        ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }}:/home/u237094395/domains/royalgatewayadmin.com/public_html/

# ---------------------------------------
# Deploy Laravel Backend
# ---------------------------------------
    - name: Deploy Laravel
      run: |
        rsync -avz --delete \
        --exclude=".env" \
        --exclude="node_modules" \
        --exclude="vendor" \
        --exclude="public/index.php" \
        -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }}" \
        backend/ \
        ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }}:/home/u237094395/apps/royalgatewayadmin/backend/

# ---------------------------------------
# Run Laravel Setup
# ---------------------------------------
    - name: Configure Backend
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.HOSTINGER_SSH_HOST }}
        username: ${{ secrets.HOSTINGER_SSH_USERNAME }}
        key: ${{ secrets.HOSTINGER_SSH_KEY }}
        port: ${{ secrets.HOSTINGER_SSH_PORT }}
        script: |
          set -e
          cd /home/u237094395/apps/royalgatewayadmin/backend
          echo "Creating deployment backup..."
          mkdir -p ../backups
          tar -czf ../backups/backend_$(date +%F_%H-%M-%S).tar.gz .
          echo "Installing Composer dependencies..."
          composer install --no-dev --optimize-autoloader --no-interaction
          echo "Running database migrations..."
          php artisan migrate --force
          echo "Optimizing Laravel..."
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          chmod -R 775 storage bootstrap/cache
          echo "Laravel deployment completed."

# ---------------------------------------
# Deploy Full Stack Routing (CORRECTED)
# ---------------------------------------
    - name: Configure Full Stack Routing
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.HOSTINGER_SSH_HOST }}
        username: ${{ secrets.HOSTINGER_SSH_USERNAME }}
        key: ${{ secrets.HOSTINGER_SSH_KEY }}
        port: ${{ secrets.HOSTINGER_SSH_PORT }}
        script: |
          # Copy Laravel public files to frontend directory for API access
          cp -r /home/u237094395/apps/royalgatewayadmin/backend/public/* /home/u237094395/domains/royalgatewayadmin.com/public_html/
          
          # Copy production index.php
          cp /home/u237094395/apps/royalgatewayadmin/backend/public/index.production.php /home/u237094395/domains/royalgatewayadmin.com/public_html/index.php
          
          # Create comprehensive .htaccess for both React and Laravel API
          cat > /home/u237094395/domains/royalgatewayadmin.com/public_html/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
          RewriteEngine On
          
          # Force HTTPS
          RewriteCond %{HTTPS} off
          RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
          
          # Serve static assets directly
          RewriteCond %{REQUEST_FILENAME} -f
          RewriteRule ^ - [L]
          
          # API requests go to Laravel
          RewriteRule ^api/(.*)$ /index.php [QSA,L]
          
          # All other requests go to React app
          RewriteRule ^(.*)$ /index.html [QSA,L]
          </IfModule>
          
          <IfModule mod_mime.c>
          AddType application/javascript .js
          AddType application/javascript .mjs
          AddType text/javascript .js
          AddType application/json .json
          AddType text/css .css
          </IfModule>
          
          <IfModule mod_deflate.c>
          AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json
          </IfModule>
          EOF
          
          # Set proper permissions
          chmod 644 /home/u237094395/domains/royalgatewayadmin.com/public_html/.htaccess
          find /home/u237094395/domains/royalgatewayadmin.com/public_html -type f -exec chmod 644 {} \;
          find /home/u237094395/domains/royalgatewayadmin.com/public_html -type d -exec chmod 755 {} \;

# ---------------------------------------
# Health Check
# ---------------------------------------
    - name: Health Check
      run: |
        sleep 10
        curl -f https://www.royalgatewayadmin.com/api/health || echo "Health check failed"