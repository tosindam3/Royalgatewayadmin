name: Deploy RoyalGatewayAdmin

on:
  push:
    branches: [ main, staging ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Build React Frontend
      run: |
        npm install
        npm run build

    - name: Copy React Build
      run: |
        # Clear old assets but keep Laravel entry points
        rm -rf backend/public/assets
        cp -r dist/* backend/public/

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.RG_SSH }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to Server
      run: |
        rsync -avz --delete \
        -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
        backend/ \
        ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.DEPLOY_PATH }}

    - name: Run Laravel Commands
      run: |
        ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
        cd ${{ secrets.DEPLOY_PATH }}
        composer install --no-dev --optimize-autoloader
        php artisan migrate --force
        php artisan db:seed --force
        php artisan config:clear
        php artisan route:clear
        php artisan cache:clear
        php artisan config:cache
        php artisan route:cache
        # Ensure directories exist and have right permissions
        chmod -R 775 storage bootstrap/cache
        # Sync build to public_html
        rsync -av --delete public/ ~/public_html/
        # Storage link and optimize
        php artisan storage:link || true
        php artisan optimize
        EOF