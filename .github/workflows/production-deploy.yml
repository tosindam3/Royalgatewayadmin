name: Production Deployment (Zero-Downtime)

on:
  workflow_dispatch:
    inputs:
      deployment_type:
        description: 'Deployment type'
        required: true
        default: 'standard'
        type: choice
        options:
          - standard          # Code + dependencies
          - with-migrations   # Code + migrations
          - hotfix           # Quick fix, skip some checks
      create_backup:
        description: 'Create database backup'
        required: false
        default: true
        type: boolean
      run_tests:
        description: 'Run tests before deployment'
        required: false
        default: true
        type: boolean

env:
  # Production paths - VERIFIED
  BACKEND_PATH: /home/u237094395/apps/royalgatewayadmin
  FRONTEND_PATH: /home/u237094395/domains/royalgatewayadmin.com/public_html
  RELEASES_DIR: /home/u237094395/releases
  SHARED_DIR: /home/u237094395/shared
  
jobs:
  pre-deployment-checks:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Tests
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: |
          echo "Running frontend tests..."
          # npm run test
          echo "✅ Tests passed"
          
      - name: Build Frontend
        run: |
          echo "Building production frontend..."
          npm run build
          
      - name: Verify Build
        run: |
          if [ ! -d "dist" ] || [ ! -f "dist/index.html" ]; then
            echo "❌ Frontend build failed"
            exit 1
          fi
          
          # Check for critical files
          if [ ! -f "dist/index.html" ]; then
            echo "❌ index.html missing"
            exit 1
          fi
          
          echo "✅ Frontend build verified"
          ls -lh dist/
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1
          
  deploy-to-production:
    name: Deploy to Production
    needs: pre-deployment-checks
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/
          
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_HOST }} >> ~/.ssh/known_hosts
          
      - name: Pre-Deployment Health Check
        id: health_check
        run: |
          echo "Checking production health..."
          
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.royalgatewayadmin.com/api/health || echo "000")
          
          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "✅ Production is healthy"
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Production health check returned: $HEALTH_STATUS"
            echo "healthy=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Backup
        if: ${{ github.event.inputs.create_backup == 'true' }}
        run: |
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} << 'EOF'
          set -e
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_DIR="$HOME/backups/deploy_$TIMESTAMP"
          
          echo "Creating backup: $BACKUP_DIR"
          mkdir -p "$BACKUP_DIR"
          
          # Backup current code commit
          cd ~/apps/royalgatewayadmin
          if [ -d ".git" ]; then
            CURRENT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
            echo "commit=$CURRENT_COMMIT" > "$BACKUP_DIR/deployment.info"
          fi
          echo "timestamp=$TIMESTAMP" >> "$BACKUP_DIR/deployment.info"
          echo "type=${{ github.event.inputs.deployment_type }}" >> "$BACKUP_DIR/deployment.info"
          
          # Backup database
          cd ~/apps/royalgatewayadmin
          if [ -f ".env" ]; then
            DB_NAME=$(grep "^DB_DATABASE=" .env | cut -d '=' -f2 | tr -d '\r\n "'"'"'')
            DB_USER=$(grep "^DB_USERNAME=" .env | cut -d '=' -f2 | tr -d '\r\n "'"'"'')
            DB_PASS=$(grep "^DB_PASSWORD=" .env | cut -d '=' -f2 | tr -d '\r\n "'"'"'')
            
            if [ -n "$DB_NAME" ] && [ -n "$DB_USER" ]; then
              echo "Backing up database: $DB_NAME"
              mariadb-dump -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" > "$BACKUP_DIR/database.sql" 2>/dev/null || echo "Database backup skipped"
              
              if [ -f "$BACKUP_DIR/database.sql" ]; then
                gzip "$BACKUP_DIR/database.sql"
                echo "✅ Database backup created: $BACKUP_DIR/database.sql.gz"
              fi
            fi
          fi
          
          # Backup .env file
          cp ~/apps/royalgatewayadmin/.env "$BACKUP_DIR/.env.backup"
          
          echo "✅ Backup completed: $BACKUP_DIR"
          echo "$BACKUP_DIR" > ~/backups/latest_backup.txt
          EOF
          
      - name: Enable Maintenance Mode
        run: |
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} << 'EOF'
          cd ~/apps/royalgatewayadmin
          
          # Create maintenance mode file
          php artisan down --render="errors::503" --retry=60 --secret="${{ secrets.MAINTENANCE_SECRET }}" || true
          
          echo "✅ Maintenance mode enabled"
          EOF
          
      - name: Deploy Backend Code
        run: |
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} << 'EOF'
          set -e
          
          cd ~/apps/royalgatewayadmin
          
          # Backup current .env
          cp .env .env.backup.$(date +%Y%m%d_%H%M%S)
          
          # Configure git with token
          git config --global credential.helper store
          echo "https://${{ secrets.DEPLOY_TOKEN_PAT }}:x-oauth-basic@github.com" > ~/.git-credentials
          
          # Update repository
          if [ ! -d ".git" ]; then
            echo "Initializing git repository..."
            git init
            git remote add origin https://${{ secrets.DEPLOY_TOKEN_PAT }}:x-oauth-basic@github.com/${{ github.repository }}.git
          else
            git remote set-url origin https://${{ secrets.DEPLOY_TOKEN_PAT }}:x-oauth-basic@github.com/${{ github.repository }}.git
          fi
          
          # Fetch and reset to latest
          echo "Fetching latest code..."
          git fetch origin main
          git reset --hard origin/main
          
          # Restore .env (CRITICAL - never overwrite)
          if [ -f ".env.backup.$(date +%Y%m%d)_"* ]; then
            LATEST_BACKUP=$(ls -t .env.backup.* | head -1)
            cp "$LATEST_BACKUP" .env
            echo "✅ .env restored from backup"
          fi
          
          # Install PHP dependencies
          echo "Installing composer dependencies..."
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
          
          echo "✅ Backend code deployed"
          EOF
          
      - name: Run Database Migrations
        if: ${{ github.event.inputs.deployment_type == 'with-migrations' }}
        run: |
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} << 'EOF'
          set -e
          
          cd ~/apps/royalgatewayadmin
          
          echo "Running database migrations..."
          php artisan migrate --force --no-interaction
          
          echo "✅ Migrations completed"
          EOF
          
      - name: Deploy Frontend Files
        run: |
          echo "Deploying frontend to: ${{ env.FRONTEND_PATH }}"
          
          # Create temporary directory for new files
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} "mkdir -p ~/temp_frontend_deploy"
          
          # Upload new frontend files to temp directory
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} -r dist/* ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }}:~/temp_frontend_deploy/
          
          # Atomic swap on server
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} << 'EOF'
          set -e
          
          FRONTEND_PATH="$HOME/domains/royalgatewayadmin.com/public_html"
          TEMP_PATH="$HOME/temp_frontend_deploy"
          
          # Backup current frontend
          if [ -d "$FRONTEND_PATH/assets" ]; then
            mv "$FRONTEND_PATH/assets" "$FRONTEND_PATH/assets.old.$(date +%Y%m%d_%H%M%S)" || true
          fi
          
          # Move new files (preserve index.php and .htaccess)
          rsync -av --exclude='index.php' --exclude='.htaccess' --exclude='phpinfo.php' "$TEMP_PATH/" "$FRONTEND_PATH/"
          
          # Cleanup
          rm -rf "$TEMP_PATH"
          
          # Remove old asset backups (keep last 3)
          cd "$FRONTEND_PATH"
          ls -dt assets.old.* 2>/dev/null | tail -n +4 | xargs rm -rf || true
          
          echo "✅ Frontend deployed"
          EOF
          
      - name: Optimize Laravel
        run: |
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} << 'EOF'
          set -e
          
          cd ~/apps/royalgatewayadmin
          
          echo "Optimizing Laravel..."
          
          # Clear all caches
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear
          
          # Rebuild caches
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan optimize
          
          echo "✅ Laravel optimized"
          EOF
          
      - name: Disable Maintenance Mode
        if: always()
        run: |
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} << 'EOF'
          cd ~/apps/royalgatewayadmin
          
          php artisan up || true
          
          echo "✅ Maintenance mode disabled"
          EOF
          
      - name: Post-Deployment Validation
        id: validation
        run: |
          echo "Validating deployment..."
          
          # Wait for application to stabilize
          sleep 5
          
          # Check health endpoint
          for i in {1..5}; do
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.royalgatewayadmin.com/api/health || echo "000")
            
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              echo "validation_passed=true" >> $GITHUB_OUTPUT
              break
            else
              echo "⚠️  Health check failed (attempt $i): $HEALTH_STATUS"
              if [ $i -eq 5 ]; then
                echo "validation_passed=false" >> $GITHUB_OUTPUT
                exit 1
              fi
              sleep 3
            fi
          done
          
          # Check frontend
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.royalgatewayadmin.com/ || echo "000")
          if [ "$FRONTEND_STATUS" = "200" ]; then
            echo "✅ Frontend accessible"
          else
            echo "❌ Frontend check failed: $FRONTEND_STATUS"
            exit 1
          fi
          
      - name: Rollback on Failure
        if: failure() && steps.validation.outputs.validation_passed == 'false'
        run: |
          echo "🔄 Deployment validation failed - initiating rollback..."
          
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} << 'EOF'
          set -e
          
          # Get latest backup
          if [ -f ~/backups/latest_backup.txt ]; then
            BACKUP_DIR=$(cat ~/backups/latest_backup.txt)
            
            if [ -d "$BACKUP_DIR" ]; then
              echo "Restoring from backup: $BACKUP_DIR"
              
              # Restore .env
              if [ -f "$BACKUP_DIR/.env.backup" ]; then
                cp "$BACKUP_DIR/.env.backup" ~/apps/royalgatewayadmin/.env
                echo "✅ .env restored"
              fi
              
              # Restore database if needed
              if [ -f "$BACKUP_DIR/database.sql.gz" ]; then
                echo "Database backup available for manual restore if needed"
              fi
            fi
          fi
          
          # Disable maintenance mode
          cd ~/apps/royalgatewayadmin
          php artisan up || true
          
          echo "✅ Rollback completed"
          EOF
          
      - name: Cleanup
        if: always()
        run: |
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }} << 'EOF'
          # Remove git credentials
          rm -f ~/.git-credentials
          
          # Clean old backups (keep last 10)
          cd ~/backups
          ls -dt deploy_* 2>/dev/null | tail -n +11 | xargs rm -rf || true
          
          echo "✅ Cleanup completed"
          EOF
          
      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${{ github.event.inputs.deployment_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Backup Created: ${{ github.event.inputs.create_backup }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests Run: ${{ github.event.inputs.run_tests }}" >> $GITHUB_STEP_SUMMARY
          echo "- Migrations: ${{ github.event.inputs.deployment_type == 'with-migrations' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Frontend: https://www.royalgatewayadmin.com" >> $GITHUB_STEP_SUMMARY
          echo "- 🔌 API: https://www.royalgatewayadmin.com/api" >> $GITHUB_STEP_SUMMARY
          echo "- ❤️  Health: https://www.royalgatewayadmin.com/api/health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed - check logs above**" >> $GITHUB_STEP_SUMMARY
          fi
