name: Test & Validate

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run Linter
        run: npm run lint || echo "Add lint script to package.json"
      
      - name: Type Check
        run: npm run type-check || npx tsc --noEmit
      
      - name: Build Test
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, sqlite3
          coverage: none
      
      - name: Install Composer Dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress
      
      - name: Copy Environment
        working-directory: backend
        run: cp .env.example .env
      
      - name: Generate Key
        working-directory: backend
        run: php artisan key:generate
      
      - name: Run Migrations
        working-directory: backend
        run: php artisan migrate --force
      
      - name: Run Tests
        working-directory: backend
        run: php artisan test || echo "Add tests to your Laravel app"
      
      - name: Check Code Style
        working-directory: backend
        run: ./vendor/bin/pint --test || echo "Install Laravel Pint for code style checks"
