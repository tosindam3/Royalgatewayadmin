<!DOCTYPE html>
<html>
<head>
    <title>Test Production Dashboard API</title>
</head>
<body>
    <h1>Production Dashboard API Test</h1>
    <button onclick="testDashboard()">Test Dashboard Manifest</button>
    <pre id="result"></pre>

    <script>
        async function testDashboard() {
            const token = prompt('Enter your auth token from production:');
            const resultEl = document.getElementById('result');
            
            try {
                resultEl.textContent = 'Loading...';
                
                const response = await fetch('https://www.royalgatewayadmin.com/api/v1/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
